<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRONOS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #121829;
    color: #d4dce8;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 32px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-icon {
    width: 52px; height: 52px;
    background: #f5a623;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .logo-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
  }
  .logo-text span { color: #f5a623; }
  .subtitle {
    font-size: 12px;
    letter-spacing: 3px;
    color: #506282;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
  }
  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    background: #192238;
    border: 1px solid #2d3e58;
    border-radius: 16px;
    padding: 32px 28px;
    text-decoration: none;
    color: inherit;
    width: 240px;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card:hover {
    border-color: #f5a623;
    background: rgba(245,166,35,0.06);
    transform: translateY(-3px);
  }
  .card-icon { font-size: 36px; }
  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #f5a623;
  }
  .card-desc { font-size: 13px; color: #8899b5; line-height: 1.5; }
  .card-tag {
    display: inline-block;
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1.5px;
    border-radius: 20px;
    padding: 3px 10px;
    font-weight: 700;
    align-self: flex-start;
  }
  .tag-desktop { background: rgba(74,158,255,0.12); color: #4a9eff; border: 1px solid rgba(74,158,255,0.3); }
  .tag-mobile  { background: rgba(46,204,138,0.12); color: #2ecc8a; border: 1px solid rgba(46,204,138,0.3); }
</style>
</head>
<body>
  <div>
    <div class="logo">
      <div class="logo-icon">⚙️</div>
      <div class="logo-text">KRO<span>NOS</span></div>
    </div>
  </div>
  <p class="subtitle">GESTÃO DE HARDWARE AGRÍCOLA</p>
  <div class="cards">
    <a class="card" href="fleet-hardware.html">
      <div class="card-icon">🖥️</div>
      <div class="card-title">Gestão de Frota</div>
      <div class="card-desc">Painel do analista. Visualize máquinas, hardwares instalados e histórico.</div>
      <span class="card-tag tag-desktop">DESKTOP</span>
    </a>
    <a class="card" href="tecnico-campo.html">
      <div class="card-icon">📱</div>
      <div class="card-title">Técnico de Campo</div>
      <div class="card-desc">App do técnico. Registre instalações, remoções e transferências de hardware.</div>
      <span class="card-tag tag-mobile">MOBILE</span>
    </a>
  </div>
</body>
</html>
